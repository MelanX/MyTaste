name: (Dev) – Test, Build & Push

on:
  push:
    branches: [main]

jobs:
  tests:
    uses: ./.github/workflows/test.yml

  docker:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE_TAG: dev

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        run: |
          docker build \
            --build-arg VITE_VERSION="dev" \
            --build-arg VITE_COMMIT_URL="https://github.com/${{ github.repository }}/commit/${{ github.sha }}" \
            -t ghcr.io/melanx/mytaste:${IMAGE_TAG} .
          docker push ghcr.io/melanx/mytaste:${IMAGE_TAG}
