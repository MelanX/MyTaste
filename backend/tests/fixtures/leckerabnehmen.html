<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />

    <title>Protein Pancakes</title>
  </head>
  <body>
    <article>
      <h1>Protein Pancakes</h1>

      <h2>Zutaten</h2>
      <p>100 g Haferflocken</p>
      <p>2 Eier</p>
      <p>1 Banane</p>
      <p>Zimt <span>(optional)</span></p>
      <p></p>

      <h2>Zubereitung</h2>
      <p>Alle Zutaten <i>gründlich</i> vermengen.</p>
      <p>In einer Pfanne von beiden Seiten anbraten.</p>
      <p>Mit Früchten servieren.</p>

      <h2>Tipps</h2>
      <p>Schmeckt auch kalt am nächsten Tag.</p>
    </article>
  </body>
</html>
