<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta property="og:image" content="https://lilya.momycooks.com/img/curry.jpg" />
    <title>Linsencurry</title>
  </head>
  <body>
    <article>
      <h1 class="entry-title">Linsencurry</h1>

      <h2>Zutaten</h2>
      <ul class="wp-block-list">
        <li><strong>200 g rote Linsen</strong></li>
        <li><strong>400 ml Kokosmilch</strong></li>
        <li><strong>1 Zwiebel</strong></li>
        <li><strong>Salz</strong></li>
      </ul>

      <h2>Zubereitung</h2>
      <ol>
        <li>Zwiebel anbraten.</li>
        <li>Linsen und Kokosmilch hinzufügen.</li>
        <li>20 Minuten köcheln lassen.</li>
      </ol>
    </article>
  </body>
</html>
